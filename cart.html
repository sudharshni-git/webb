<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Cart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        /* FORCE SCROLLING: This ensures the browser allows vertical movement */
        html, body {
            margin: 0; 
            padding: 0; 
            font-family: 'Montserrat', sans-serif;
            color: #2d3436; 
            height: auto !important; /* Allow height to grow */
            min-height: 100%;
            overflow-x: hidden;
            overflow-y: auto !important; /* Force scroll visibility */
            -webkit-overflow-scrolling: touch; /* Smooth scroll for mobile */
        }

        /* --- VIDEO BACKGROUND --- */
        .video-container { position: fixed; inset: 0; z-index: -2; pointer-events: none; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        
        .overlay {
            position: fixed; inset: 0; 
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            z-index: -1; opacity: 0.4; pointer-events: none;
        }

        /* --- NAV --- */
        .navbar {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            position: sticky; top: 0; z-index: 100;
        }
        .navbar a { color: #4a148c; text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }

        /* --- CONTENT CONTAINER --- */
        .container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px 150px 20px; /* Large bottom padding for scrolling space */
            position: relative; 
            z-index: 1; 
        }

        h1 { font-weight: 800; color: #3f1dcb; text-align: center; margin-bottom: 50px; text-shadow: 0 2px 10px rgba(255,255,255,0.5); }

        /* --- ALTERNATING LAYOUT (From your sketch) --- */
        .cart-item {
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(12px);
            padding: 25px; 
            border-radius: 35px; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            display: flex; 
            align-items: center; 
            gap: 30px; 
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Alternating Direction Logic */
        .cart-item:nth-child(even) { flex-direction: row-reverse; text-align: right; }
        .cart-item:nth-child(even) .qty-control { justify-content: flex-end; }

        /* TOUCH RAISE EFFECT */
        .cart-item:hover, .cart-item:active {
            transform: translateY(-10px) scale(1.02);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px rgba(63, 29, 203, 0.2);
            border-color: #ff0080;
        }

        .cart-item img { 
            width: 140px; height: 140px; 
            border-radius: 25px; 
            object-fit: cover; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .item-info { flex-grow: 1; }
        .item-info h3 { margin: 0; color: #4a148c; font-size: 1.4rem; font-weight: 800; }
        .item-price { font-weight: 800; color: #ff0080; margin-top: 10px; font-size: 1.2rem; }

        /* --- QTY CONTROLS --- */
        .qty-control { display: flex; align-items: center; gap: 15px; margin-top: 15px; }
        .qty-btn {
            background: #3f1dcb; color: white; border: none;
            width: 35px; height: 35px; border-radius: 50%;
            cursor: pointer; font-weight: 800; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { background: #ff0080; transform: rotate(90deg); }
        .qty-count { font-weight: 800; font-size: 1.1rem; color: #3f1dcb; }

        /* --- FOOTER --- */
        .cart-footer {
            margin-top: 50px; padding: 40px; border-radius: 40px;
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px);
            text-align: center; border: 1px solid white;
        }
        .total-price { font-size: 2.2rem; font-weight: 800; color: #3f1dcb; margin-bottom: 25px; }

        .btn-checkout {
            padding: 20px 60px; border-radius: 50px; border: none;
            background: linear-gradient(45deg, #3f1dcb, #ff0080);
            color: #fff; font-weight: 800; text-transform: uppercase;
            cursor: pointer; font-size: 1.1rem; transition: 0.3s;
            box-shadow: 0 10px 25px rgba(255, 0, 128, 0.3);
        }
        .btn-checkout:hover { transform: scale(1.05); box-shadow: 0 15px 35px rgba(255, 0, 128, 0.5); }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay muted loop playsinline><source src="s.mp4" type="video/mp4"></video>
</div>
<div class="overlay"></div>

<div class="navbar">
    <a href="home.html">← Back</a>
    <a href="home.html">Home</a>
</div>

<div class="container">
    <h1>Your Cart 🛒</h1>
    <div id="cart-list"></div>
    <div id="cart-summary" class="cart-footer" style="display: none;">
        <div class="total-price" id="total-val">Total: ₹0</div>
        <button class="btn-checkout" onclick="checkout()">Checkout Now</button>
        <button class="clear-link" onclick="clearAll()" style="display:block; margin: 20px auto; background:none; border:none; color:#4a148c; font-weight:700; cursor:pointer; text-decoration:underline;">Clear Cart</button>
    </div>
</div>

<script>
   function renderCart() {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        let listDiv = document.getElementById('cart-list');
        let summaryDiv = document.getElementById('cart-summary');
        let totalSpan = document.getElementById('total-val');

        if (cart.length === 0) {
            listDiv.innerHTML = `<div style="text-align:center; padding: 60px; background: rgba(255,255,255,0.4); border-radius: 40px; backdrop-filter: blur(10px);">
                <p style="font-weight:800; font-size: 1.5rem; color: #4a148c;">Your scoop is empty!</p>
                <a href="home.html#menu" style="color: #ff0080; font-weight: 800; text-decoration:none; font-size:1.2rem;">Add some treats 🍦</a>
            </div>`;
            summaryDiv.style.display = 'none';
            return;
        }

        summaryDiv.style.display = 'block';
        let grandTotal = 0;

        listDiv.innerHTML = cart.map((item, index) => {
            if (!item.qty) item.qty = 1;
            let price = parseInt(item.price);
            grandTotal += (price * item.qty);

            return `
                <div class="cart-item">
                    <img src="${item.image}">
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p class="item-price">₹${price}</p>
                        <div class="qty-control">
                            <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                            <span class="qty-count">${item.qty}</span>
                            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
                        </div>
                    </div>
                </div>`;
        }).join('');

        totalSpan.innerText = `Total: ₹${grandTotal}`;
        localStorage.setItem('myCart', JSON.stringify(cart));
    }

    function changeQty(index, amount) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        cart[index].qty = (cart[index].qty || 1) + amount;
        if (cart[index].qty <= 0) cart.splice(index, 1);
        localStorage.setItem('myCart', JSON.stringify(cart));
        renderCart();
    }

    function clearAll() {
        if(confirm("Empty cart?")) {
            localStorage.removeItem('myCart');
            renderCart();
        }
    }

    function checkout() {
        window.location.href = "place.html";
    }

    window.onload = renderCart;
</script>
</body>
</html>
