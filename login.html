<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* --- VIDEO BACKGROUND --- */
        .video-container { position: fixed; inset: 0; z-index: -2; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); z-index: -1; }

        /* --- LOGIN CARD --- */
        .login-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            padding: 40px; border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
            width: 90%; max-width: 400px; text-align: center; z-index: 10;
            position: relative;
        }

        /* Back to Home Link */
        .back-home {
            display: block; margin-bottom: 20px; color: #fff; 
            text-decoration: none; font-size: 0.8rem; font-weight: 700; 
            text-transform: uppercase; opacity: 0.8; transition: 0.3s;
        }
        .back-home:hover { opacity: 1; transform: translateX(-5px); }

        h2 { color: #fff; margin-bottom: 5px; font-weight: 800; }
        .subtitle { color: #ddd; font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 12px; text-align: left; }
        
        input, textarea {
            width: 100%; padding: 14px 15px; border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3); box-sizing: border-box;
            outline: none; font-family: inherit; background: rgba(255, 255, 255, 0.9);
            transition: 0.3s;
        }

        /* Password Eye Styling */
        .pass-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #666;
        }

        .error-text {
            color: #ff4d4d; font-size: 0.7rem; font-weight: 700;
            margin-top: 4px; margin-left: 5px; display: none;
        }

        .btn-login {
            width: 100%; padding: 16px; margin-top: 15px; border-radius: 20px; border: none;
            background: linear-gradient(45deg, #ff66cc, #7b1fa2); color: white;
            font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }

        /* Logout Button Style */
        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
        }

        .btn-login:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        .logout-link { color: #ff66cc; cursor: pointer; font-weight: 700; text-decoration: underline; }
    </style>
</head>
<body>

<div class="video-container">
    <video autoplay muted loop playsinline><source src="how.mp4" type="video/mp4"></video>
</div>
<div class="overlay"></div>

<div class="login-card" id="loginForm">
    <a href="home.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

    <h2 id="modal-title">Join the Chill Zone</h2>
    <p class="subtitle" id="formSubtitle">Enter details to start scooping!</p>
    
    <div id="auth-fields">
        <div class="input-group">
            <input type="text" id="username" placeholder="Full Name">
            <div class="error-text" id="err-name">Name is required</div>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
            <div class="error-text" id="err-email">Enter a valid email address</div>
        </div>

        <div class="input-group pass-wrapper">
            <input type="password" id="password" placeholder="Create Password">
            <i class="fa-solid fa-eye toggle-password" onclick="togglePass()"></i>
            <div class="error-text" id="err-pass">Password must be 6+ characters</div>
        </div>

        <div class="input-group">
            <input type="tel" id="contact" placeholder="Contact Number (10 digits)">
            <div class="error-text" id="err-contact">Enter a valid 10-digit number</div>
        </div>

        <div class="input-group">
            <textarea id="address" placeholder="Delivery Address"></textarea>
            <div class="error-text" id="err-address">Address is required</div>
        </div>

        <button class="btn-login" onclick="handleLogin()">Login & Continue</button>
    </div>

    <div id="already-logged-in" style="display:none">
        <p style="color:white; margin-bottom: 20px;">You are currently active in the Chill Zone!</p>
        <button class="btn-login" onclick="window.location.href='home.html'">Go to Home</button>
        <button class="btn-login btn-logout" onclick="handleLogout()">Logout Account</button>
    </div>
</div>

<script>
    // Toggle Password Visibility
    function togglePass() {
        const passInput = document.getElementById('password');
        const icon = document.querySelector('.toggle-password');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function handleLogin() {
        document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');
        
        const name = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value.trim();
        const contact = document.getElementById('contact').value.trim();
        const address = document.getElementById('address').value.trim();

        let isValid = true;

        if (!name) { document.getElementById('err-name').style.display = 'block'; isValid = false; }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) { document.getElementById('err-email').style.display = 'block'; isValid = false; }

        if (pass.length < 6) { document.getElementById('err-pass').style.display = 'block'; isValid = false; }

        const phonePattern = /^[0-9]{10}$/;
        if (!phonePattern.test(contact)) { document.getElementById('err-contact').style.display = 'block'; isValid = false; }

        if (!address) { document.getElementById('err-address').style.display = 'block'; isValid = false; }

        if (!isValid) return;

        localStorage.setItem('isLoggedIn', 'true');
        localStorage.setItem('userName', name);
        localStorage.setItem('userEmail', email);
        localStorage.setItem('userContact', contact);
        localStorage.setItem('userAddress', address);

        let pending = localStorage.getItem('pendingItem');
        if (pending) {
            let item = JSON.parse(pending);
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            cart.push(item);
            localStorage.setItem('myCart', JSON.stringify(cart));
            localStorage.removeItem('pendingItem');
            window.location.href = "cart.html"; 
        } else {
            window.location.href = "home.html"; 
        }
    }

    function handleLogout() {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userName');
        localStorage.removeItem('userEmail');
        localStorage.removeItem('userContact');
        localStorage.removeItem('userAddress');
        alert("Logged out successfully!");
        location.reload();
    }

    window.onload = function() {
        if(localStorage.getItem('isLoggedIn') === 'true') {
            document.getElementById('auth-fields').style.display = 'none';
            document.getElementById('formSubtitle').style.display = 'none';
            document.getElementById('already-logged-in').style.display = 'block';
            document.getElementById('modal-title').innerText = "Hi, " + localStorage.getItem('userName');
        }
    }
</script>

</body>
</html>
